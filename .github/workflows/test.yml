name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show Python version
        run: python --version

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Verify package builds and imports
        run: |
          python -m pip install --upgrade pip build
          python -m build
          python -m pip install dist/*.whl
          python -c "import modelctl, modelctl_core; print('import ok')"

  privacy-scan:
    name: privacy scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run private marker scan
        run: python scripts/check_private_markers.py
